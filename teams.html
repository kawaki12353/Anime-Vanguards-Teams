<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Vanguards - Team Comps</title>

    <link rel="stylesheet" href="menu.css">
    <script src="menu.js" defer></script>

    <style>
        /* --- Variáveis e Temas (Mantidos conforme solicitado) --- */
        :root {
            --bg: #f2f4f7;
            --card: #ffffff;
            --text: #111;
            --border: #ccc;
            --hover: #f1f1f1;
            --lang-btn: #ffffff;
            --lang-btn-bg: #444;
            --primary: #0d47a1;
            --trait-color: #2c3e50;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f1217;
                --card: #181c24;
                --text: #ffffff;
                --border: #2a2f3a;
                --hover: #232836;
                --lang-btn: #111;
                --lang-btn-bg: #ffffff;
                --primary: #64b5f6;
                --trait-color: #34495e;
            }
        }

        /* --- Geral --- */
        body {
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            margin: 0;
            line-height: 1.5;
            padding-bottom: 80px; 
        }

        .header { 
            display: flex; 
            justify-content: center; 
            max-width: 1200px; 
            margin: 0 auto 30px; 
        }
        .logo { width: 220px; max-width: 60vw; }

        /* --- Estilo das Composições --- */
        .teams-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .team-block {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .team-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .unit-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            width: 100%;
        }

        /* Container do Slot (para permitir arrastar/scroll) */
        .unit-slot {
            aspect-ratio: 1 / 1;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 12px;
            overflow-y: auto; /* Permite o scroll vertical */
            scroll-snap-type: y mandatory;
            scrollbar-width: none; /* Esconde scroll no Firefox */
        }
        .unit-slot::-webkit-scrollbar { display: none; } /* Esconde scroll no Chrome/Safari */

        .unit-card {
            height: 100%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            scroll-snap-align: start;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
        }

        .unit-card img {
            width: 85%;
            height: 85%;
            object-fit: contain;
        }

        .swap-indicator {
            position: absolute;
            bottom: 4px;
            font-size: 10px;
            opacity: 0.5;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-3px);}
            60% {transform: translateY(-2px);}
        }

        .team-dps {
            margin-top: 15px;
            font-weight: bold;
            font-size: 16px;
            background: var(--border);
            padding: 5px 20px;
            border-radius: 20px;
            color: var(--text);
        }

        /* --- Modal (Adaptado do original) --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 10001;
            display: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .modal-overlay.active { display: block; opacity: 1; }

        .modal-content {
            background: var(--card);
            position: fixed;
            z-index: 10002;
            padding: 25px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        @media (min-width: 769px) {
            .modal-content {
                width: 400px;
                top: 50%; left: 50%;
                transform: translate(-50%, -50%);
                border-radius: 15px;
            }
        }

        @media (max-width: 768px) {
            .unit-grid { grid-template-columns: repeat(3, 1fr); } /* 3x2 no mobile para visibilidade */
            .modal-content {
                width: 100%;
                bottom: 0; left: 0;
                border-radius: 20px 20px 0 0;
                transform: translateY(100%);
                transition: transform 0.4s ease;
            }
            .modal-content.open { transform: translateY(0); }
        }

        .modal-unit-img { width: 120px; height: 120px; margin-bottom: 15px; }
        .trait-tag {
            background: var(--trait-color);
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 10px;
        }

        /* --- Idioma --- */
        .lang-toggle {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }
        .lang-toggle button {
            background: var(--text);
            color: var(--card);
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>

<header class="header">
    <!-- Nome alterado conforme solicitado -->
    <h1 style="color: var(--primary); font-size: 28px;">ANIME VANGUARDS</h1>
</header>

<main>
    <div class="teams-container" id="teamsContainer">
        <!-- As composições serão geradas via JavaScript -->
    </div>
</main>

<div class="lang-toggle">
    <button id="langBtn" onclick="toggleLang()"></button>
</div>

<!-- Modal para detalhes da Unit -->
<div id="modalOverlay" class="modal-overlay" onclick="closeModal()"></div>
<div id="modalContent" class="modal-content"></div>

<script>
/* 
   DATABASE DE EXEMPLO 
   Estrutura: cada comp tem um título, dps e 6 slots.
   Cada slot pode ser uma única unit ou uma Array de units (para o sistema de arrastar).
*/
const teamsData = [
    {
        title: { pt: "Meta Story Mode", en: "Meta Story Mode" },
        dps: "1.2M+",
        units: [
            { name: "Song Jinwu", trait: "Solar", img: "assets/sprites/1.png" }, // Exemplo de unit única
            [ 
                { name: "Vogita", trait: "Evolved", img: "assets/sprites/2.png" }, 
                { name: "Igris", trait: "Shadow", img: "assets/sprites/3.png" } 
            ], // Exemplo de slot com troca (arrastar)
            { name: "Cha-In", trait: "Monarch", img: "assets/sprites/4.png" },
            { name: "Genas", trait: "Overdrive", img: "assets/sprites/5.png" },
            { name: "Rukia", trait: "Ice Queen", img: "assets/sprites/6.png" },
            { name: "Alucard", trait: "Vampiric", img: "assets/sprites/7.png" }
        ]
    }
];

let lang = localStorage.getItem("siteLang") || "pt";

const uiText = {
    pt: { btn: "🇧🇷 PT", dpsLabel: "DPS Total: ", bestTrait: "Melhor Trait: " },
    en: { btn: "🇺🇸 EN", dpsLabel: "Total DPS: ", bestTrait: "Best Trait: " }
};

function renderTeams() {
    const container = document.getElementById('teamsContainer');
    container.innerHTML = "";
    const ui = uiText[lang];

    teamsData.forEach(team => {
        const block = document.createElement('div');
        block.className = 'team-block';

        const title = document.createElement('div');
        title.className = 'team-title';
        title.textContent = team.title[lang];

        const grid = document.createElement('div');
        grid.className = 'unit-grid';

        team.units.forEach(slot => {
            const slotDiv = document.createElement('div');
            slotDiv.className = 'unit-slot';

            // Se for uma array, cria múltiplas unidades no mesmo slot para o "arrastar"
            const unitsInSlot = Array.isArray(slot) ? slot : [slot];
            
            unitsInSlot.forEach((unit, index) => {
                const unitCard = document.createElement('div');
                unitCard.className = 'unit-card';
                unitCard.onclick = () => openModal(unit);
                
                unitCard.innerHTML = `
                    <img src="${unit.img}" onerror="this.src='assets/sem_icone.png'">
                    ${unitsInSlot.length > 1 && index === 0 ? '<div class="swap-indicator">▼ swap</div>' : ''}
                `;
                slotDiv.appendChild(unitCard);
            });

            grid.appendChild(slotDiv);
        });

        const dps = document.createElement('div');
        dps.className = 'team-dps';
        dps.textContent = `${ui.dpsLabel} ~ ${team.dps}`;

        block.appendChild(title);
        block.appendChild(grid);
        block.appendChild(dps);
        container.appendChild(block);
    });

    document.getElementById('langBtn').textContent = ui.btn;
}

function openModal(unit) {
    const modal = document.getElementById('modalContent');
    const overlay = document.getElementById('modalOverlay');
    const ui = uiText[lang];

    modal.innerHTML = `
        <h2 style="margin: 0; color: var(--primary);">${unit.name}</h2>
        <img src="${unit.img}" class="modal-unit-img" onerror="this.src='assets/sem_icone.png'">
        <div style="font-weight: bold; opacity: 0.8;">${ui.bestTrait}</div>
        <div class="trait-tag">${unit.trait}</div>
        <p style="margin-top: 20px; font-size: 14px; opacity: 0.7;">Clique fora para fechar</p>
    `;

    overlay.classList.add('active');
    modal.style.display = "flex";
    setTimeout(() => modal.classList.add('open'), 10);
}

function closeModal() {
    const modal = document.getElementById('modalContent');
    const overlay = document.getElementById('modalOverlay');
    modal.classList.remove('open');
    overlay.classList.remove('active');
    setTimeout(() => { modal.style.display = "none"; }, 300);
}

function toggleLang() {
    lang = lang === "pt" ? "en" : "pt";
    localStorage.setItem("siteLang", lang);
    renderTeams();
}

window.onload = renderTeams;
</script>

</body>
</html>
