<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Vanguards - Team Comps</title>

    <script src="database/teams.js"></script>
    <script src="database/units.js"></script>

    <link rel="stylesheet" href="menu.css">
    <script src="menu.js" defer></script>

    <style>
        /* --- Variáveis e Temas --- */
        :root {
            --bg: #fafafa;
            --card: #ffffff;
            --text: #111;
            --border: #ccc;
            --hover: #f1f1f1;
            --lang-btn: #ffffff;
            --lang-btn-bg: #444;
            --primary: #0d47a1;
            --trait-color: #2c3e50;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #050505;
                --card: #121212;
                --text: #ffffff;
                --border: #2a2f3a;
                --hover: #232836;
                --lang-btn: #111;
                --lang-btn-bg: #ffffff;
                --primary: #64b5f6;
                --trait-color: #34495e;
            }
        }

        /* --- Geral --- */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            margin: 0;
            line-height: 1.5;
            padding-bottom: 80px; 
        }

        .header { 
            display: flex; 
            justify-content: center; 
            max-width: 1200px; 
            margin: 0 auto 30px; 
        }
        .logo { width: 220px; max-width: 60vw; }

        /* --- Custom UI Filtros Adaptados --- */
        .filters-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 0 auto 30px;
            width: 50%;
            position: relative;
        }

        .filter-wrapper {
            position: relative;
            flex: 1;
        }

        .filter-btn {
            width: 100%;
            padding: 12px 20px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 25px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            outline: none;
            cursor: pointer;
            transition: border-color 0.3s, box-shadow 0.3s;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .filter-btn:focus, .filter-btn.active {
            border-color: var(--primary);
            box-shadow: 0 0 8px rgba(13, 71, 161, 0.2);
        }

        .filter-dropdown {
            display: none;
            position: absolute;
            top: 110%;
            left: 0;
            width: 100%;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            max-height: 250px;
            overflow-y: auto;
            padding: 10px;
        }

        .filter-dropdown.show {
            display: block;
        }

        .filter-search-input {
            width: 100%;
            padding: 8px 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            outline: none;
            font-size: 14px;
        }

        .filter-option {
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.2s, color 0.2s;
            font-size: 14px;
        }

        .filter-option:hover {
            background: var(--hover);
        }

        .filter-option.selected {
            background: var(--primary);
            color: #ffffff;
        }

        /* --- Estilo das Composições --- */
        .teams-container {
            max-width: 1200px; /* Aumentado para comportar 2 colunas */
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 Colunas para PC */
            gap: 40px;
        }

        .team-block {
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* Nome do Time para a Esquerda */
            background: linear-gradient(to bottom right, #ffffff, #fff0f5); /* Modo Claro: Branco da paleta e Rosa bem claro */
            border: 1px solid var(--border);
            padding: 10px 0 15px 0; /* Diminuída a altura reduzindo o padding superior e inferior */
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative; /* Adicionado para posicionar o Rank de forma absoluta no topo direito */
        }

        @media (prefers-color-scheme: dark) {
            .team-block {
                background: linear-gradient(to bottom right, #001f4d, #000000); /* Modo Escuro: Mantém original */
            }
        }

        .team-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px; /* Reduzido para fazer o container de slots ir mais para cima */
            margin-left: 25px; /* Compensa o recuo do padding removido no bloco pai */
            color: #ffffff; /* Nome do time Branco */
            text-transform: lowercase; /* Letra minúscula normal */
            letter-spacing: 1px;
        }

        @media (prefers-color-scheme: light) {
            .team-title {
                color: #111111; /* Nome do time escuro no modo claro para legibilidade */
            }
        }

        /* Aplica a primeira letra de cada palavra em Maiúscula */
        .team-title::first-letter {
            text-transform: uppercase;
        }
        .team-title {
            text-transform: lowercase;
        }

        /* Container Preto Interno de ponta a ponta */
        .slots-full-container {
            width: 100%;
            background: #000000;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            padding: 15px 25px; /* Restaura o espaçamento lateral interno para o Grid */
        }

        .unit-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3x2 para PC */
            gap: 10px;
            width: 100%;
        }

        .unit-slot {
            aspect-ratio: 1 / 1;
            background: var(--bg);
            border: 2px solid #ffffff; /* Borda branca da moldura do Slot */
            border-radius: 50%; /* Moldura do Slot completamente Redonda */
            overflow: visible; /* Alterado para visible para permitir que a moldura dos elementos fique por cima */
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            transform: scale(0.92); /* Modificado: Aumentado um Pouquinho o tamanho (de 0.85 para 0.92) */
            position: relative;
        }
        .unit-slot::-webkit-scrollbar { display: none; }

        .unit-card {
            height: 100%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            scroll-snap-align: start;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
            border-radius: 50%;
            overflow: visible; /* Garante que elementos filhos absolutos não sejam cortados */
        }

        .unit-card img {
            width: 85%;
            height: 85%;
            object-fit: contain;
            border-radius: 50%;
        }

        /* Container absoluto para isolar as molduras dos elementos sem afetar o tamanho do slot */
        .elements-wrapper {
            position: absolute;
            bottom: -6px;
            right: -6px;
            width: 34px;
            height: 34px;
            z-index: 5;
            pointer-events: none;
        }

        /* Estilo base para as molduras redondas de elementos */
        .element-frame {
            position: absolute;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid #444444;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            backdrop-filter: blur(2px);
        }

        .element-frame img {
            width: 80% !important;
            height: 80% !important;
            object-fit: contain;
        }

        /* Posicionamento quando há múltiplos elementos */
        .element-frame.frame-single, .element-frame.frame-1 {
            bottom: 0;
            right: 0;
            z-index: 2;
        }

        .element-frame.frame-2 {
            bottom: 10px;
            right: -10px;
            z-index: 1;
        }

        .swap-indicator {
            position: absolute;
            bottom: 4px;
            font-size: 10px;
            opacity: 0.5;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-3px);}
            60% {transform: translateY(-2px);}
        }

        .team-dps {
            align-self: flex-end; /* DPS para a Direita */
            margin-top: 8px; /* Diminuído ligeiramente de 15px para 8px para reduzir a altura inferior */
            margin-right: 25px; /* Compensa o recuo do padding removido no bloco pai */
            font-weight: bold;
            font-size: 13px; /* Diminuído o tamanho do texto do DPS */
            background: rgba(0, 191, 255, 0.2); /* Fundo Azul Claro transparente */
            border: 1px solid #00bfff; /* Borda Azul Claro */
            padding: 3px 14px; /* Diminuído o preenchimento interno do DPS */
            border-radius: 20px;
            color: #ffffff; /* Letra continua Branca */
        }

        /* Container inferior para organizar o botão #tags e o DPS opostos */
        .team-footer {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Botão #tags no canto esquerdo inferior */
        .team-tags-btn {
            align-self: flex-start;
            margin-top: 8px;
            margin-left: 25px;
            font-weight: bold;
            font-size: 13px; /* Mesmo tamanho que a letra falando do DPS do time */
            background: rgba(255, 215, 0, 0.2); /* Fundo Amarelo Transparente */
            border: 1px solid #ffd700; /* Borda Amarela */
            padding: 3px 14px; /* Mesma forma do DPS */
            border-radius: 20px; /* Mesma forma do DPS */
            color: #ffd700; /* Letra Amarela */
            cursor: pointer;
            transition: transform 0.2s ease; /* Transição para o pequeno zoom */
        }

        .team-tags-btn:active {
            transform: scale(1.08); /* Pequenino zoom ao clicar */
        }

        /* DPS Rank no canto superior direito */
        .team-rank {
            position: absolute;
            top: 10px;
            right: 22px; /* Vai um pouquinho mais para a direita (de 25px para 22px) */
            font-weight: bold;
            font-size: 12.5px; /* Diminuído bem pouquinho o tamanho da fonte (de 13px para 12.5px) */
            background: rgba(144, 238, 144, 0.2); /* Fundo Verde mais claro transparente (LightGreen) */
            border: 1px solid #90ee90; /* Borda Verde mais claro (LightGreen) */
            padding: 2px 14px; /* Diminuída um pouquinho a distância do fundo até a letra verticalmente (de 3px para 2px) */
            color: #90ee90; /* Cor da letra Verde mais claro (LightGreen) */
            border-radius: 0px; /* Pontas pontiagudas (não redondas) */
        }

        /* Estilo das Tags mostradas no Modal */
        .modal-tags-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 15px;
            width: 100%;
        }
        .tag-badge {
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid #ffd700;
            color: #ffd700;
            padding: 5px 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
        }

        /* --- Modal --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 10001;
            display: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .modal-overlay.active { display: block; opacity: 1; }

        .modal-content {
            background: var(--card);
            position: fixed;
            z-index: 10002;
            padding: 25px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            display: none; 
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        @media (min-width: 769px) {
            .modal-content {
                width: 400px;
                top: 50%; left: 50%;
                transform: translate(-50%, -50%);
                border-radius: 15px;
            }
        }

        @media (max-width: 768px) {
            .header {
                justify-content: flex-end; /* Logo no canto superior direito para Mobile */
            }

            .logo {
                width: 165px; /* Reduzido em 25% (Original 220px) */
            }

            .filters-container {
                width: 90%; /* Ajuste de largura para mobile */
            }

            .teams-container {
                grid-template-columns: 1fr; /* 1 coluna para Mobile */
            }

            .unit-grid { 
                grid-template-columns: repeat(3, 1fr); 
                gap: 5px;
            } 

            .modal-content {
                width: 100%;
                bottom: 0; left: 0;
                border-radius: 20px 20px 0 0;
                transform: translateY(100%);
                transition: transform 0.4s ease;
            }
            .modal-content.open { transform: translateY(0); }
        }

        .modal-unit-container {
            position: relative;
            width: 120px;
            height: 120px;
            flex-shrink: 0;
        }

        .modal-unit-img { width: 100%; height: 100%; margin-bottom: 0; }

        /* Reaproveitando a estrutura de elementos do Wrapper para o Modal */
        .modal-unit-container .elements-wrapper {
            bottom: -4px;
            right: -4px;
            width: 42px;
            height: 42px;
        }

        .modal-unit-container .element-frame {
            width: 34px;
            height: 34px;
        }

        .modal-unit-container .element-frame.frame-2 {
            bottom: 12px;
            right: -12px;
        }

        .trait-container {
            display: flex;
            flex-direction: row; 
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .trait-img {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        .trait-tag {
            background: transparent;
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
        }

        /* --- Idioma --- */
        .lang-toggle {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }
        .lang-toggle button {
            background: var(--text);
            color: var(--card);
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        /* --- Estilização para o texto Monarch / Títulos no Modal com degradê e sem fundo --- */
        .monarch-gradient-text {
            background: linear-gradient(to right, #C71585, #0000FF, #00FFFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
            display: inline-block;
            background-color: transparent !important;
        }

        /* Classe de cor amarela para traits do sistema [2] */
        .trait-yellow-text {
            color: #ffeb3b !important;
            -webkit-text-fill-color: initial !important;
            background: none !important;
        }

        /* Classe de cor branca padrão para traits sem identificadores */
        .trait-white-text {
            color: #ffffff !important;
            -webkit-text-fill-color: initial !important;
            background: none !important;
        }

        /* Estilos para as molduras customizadas de Memória e Familiar */
        .modal-frames-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            width: 100%;
            margin-bottom: 15px;
        }

        .modal-frame-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 45%;
        }

        .modal-frame-title {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
            text-align: center;
            order: 1; /* Invertido: Força o nome do item a ir para baixo da moldura */
            margin-top: 5px;
        }

        /* Novo estilo para as labels fixas estáticas no topo das molduras */
        .modal-frame-label {
            font-size: 14px;
            font-weight: bold;
            color: var(--text);
            opacity: 0.8;
            margin-bottom: 5px;
            text-align: center;
            width: 100%;
        }

        .modal-frame-square {
            width: 95px; /* Modificado: Aumentado um pouco o tamanho da moldura (era 80px) */
            height: 95px; /* Modificado: Aumentado um pouco o tamanho da moldura (era 80px) */
            border: 2px solid var(--border);
            border-radius: 8px;
            background: rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            order: 0; /* Invertido: Mantém a moldura no topo, logo após a label fixa */
        }

        .modal-frame-square img {
            width: 90%;
            height: 90%;
            object-fit: contain;
        }

        /* Estilizações de Borda em Degradê Customizadas via CSS */
        .frame-familiar-gradient {
            border: 3px solid transparent !important;
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)) padding-box, linear-gradient(135deg, #FF0000, #550000) border-box !important;
        }

        .frame-vanguard-gradient {
            border: 3px solid transparent !important;
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)) padding-box, linear-gradient(135deg, #00008B, #000000) border-box !important;
        }

        .frame-secret-gradient {
            border: 3px solid transparent !important;
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)) padding-box, linear-gradient(135deg, #FF0000, #550000) border-box !important;
        }

        .frame-exclusive-gradient {
            border: 3px solid transparent !important;
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)) padding-box, linear-gradient(135deg, #FFC0CB, #FFB6C1) border-box !important;
        }

        .frame-mythic-gradient {
            border: 3px solid transparent !important;
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)) padding-box, linear-gradient(135deg, #87CEEB, #00FF00, #FFFF00, #FF0000, #800080) border-box !important;
        }

        .frame-legendary-gradient {
            border: 3px solid transparent !important;
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)) padding-box, linear-gradient(135deg, #FFD700, #FFA500) border-box !important;
        }

        .frame-epic-gradient {
            border: 3px solid transparent !important;
            background: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)) padding-box, linear-gradient(135deg, #800080, #000000) border-box !important;
        }
    </style>
</head>

<body>

<header class="header">
    <img src="assets/Av_logo.png" alt="Anime Vanguards Logo" class="logo">
</header>

<div class="filters-container">
    <!-- Filtro de Tags (Esquerda) -->
    <div class="filter-wrapper">
        <button id="tagFilterBtn" class="filter-btn" onclick="toggleDropdown('tagDropdown')">Tags: Todas</button>
        <div id="tagDropdown" class="filter-dropdown">
            <!-- Populado dinamicamente via JS -->
        </div>
    </div>

    <!-- Filtro de Units (Direita) -->
    <div class="filter-wrapper">
        <button id="unitFilterBtn" class="filter-btn" onclick="toggleDropdown('unitDropdown')">Units: Todas</button>
        <div id="unitDropdown" class="filter-dropdown">
            <input type="text" id="unitSearch" class="filter-search-input" oninput="filterUnitOptions()" placeholder="Buscar unit...">
            <div id="unitOptionsContainer">
                <!-- Populado dinamicamente via JS -->
            </div>
        </div>
    </div>
</div>

<main>
    <div class="teams-container" id="teamsContainer">
    </div>
</main>

<div class="lang-toggle">
    <button id="langBtn" onclick="toggleLang()"></button>
</div>

<div id="modalOverlay" class="modal-overlay" onclick="closeModal()"></div>
<div id="modalContent" class="modal-content"></div>

<script>
let lang = localStorage.getItem("siteLang") || "pt";

// Estado dos filtros selecionados
let selectedTag = "";
let selectedUnit = "";

// Adicionado os textos estáticos dos títulos "Familiar:" e "Memória:" seguindo a mesma tradução
const uiText = {
    pt: { btn: "🇧🇷 PT", dpsLabel: "DPS Total: ", bestTrait: "Melhor Trait: ", familiarLabel: "Familiar: ", memoriaLabel: "Memória: ", noTeams: "Nenhum time aqui ainda", closeMsg: "Clique fora para fechar", searchPlaceholder: "Pesquisar times...", tagsLabel: "Tags do Time", allTags: "Tags: Todas", allUnits: "Units: Todas" },
    en: { btn: "🇺🇸 EN", dpsLabel: "Total DPS: ", bestTrait: "Best Trait: ", familiarLabel: "Familiar: ", memoriaLabel: "Memory: ", noTeams: "No teams here yet", closeMsg: "Click outside to close", searchPlaceholder: "Search teams...", tagsLabel: "Team Tags", allTags: "Tags: All", allUnits: "Units: All" }
};

// Objeto do Banco de dados das Memórias para verificação de raridade
const memorias = {
    "Vanguard": [
        "Enthusiastic Walks",
        "Peak of Shinobi"
    ],
    "Secret": [
        "All I've Got",
        "Ultimate Deceiver",
        "Shall Know Pain",
        "Company Captain's Presence",
        "Trust of Others"
    ],
    "Exclusive": [
        "Soon"
    ],
    "Mythic": [
        "A Father's Sacrifice"
    ],
    "Legendary": [
        "Soon"
    ],
    "Epic": [
        "DoT Amplifier" 
    ]
};

// Função interna para descobrir o CSS do gradiente com base no nome da memória dentro do banco de dados fornecido
function getMemoriaClass(memoriaName) {
    if (!memoriaName || memoriaName === "N/A") return "";
    for (const raridade in memorias) {
        if (memorias[raridade].includes(memoriaName)) {
            return `frame-${raridade.toLowerCase()}-gradient`;
        }
    }
    return "";
}

let globalUnits = {};
let globalTeams = [];

function capitalizeWords(str) {
    return str.split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()).join(' ');
}

function loadDatabase() {
    try {
        globalUnits = {};
        for (const name in units) {
            globalUnits[name] = {
                ...units[name],
                name: name 
            };
        }

        globalTeams = Object.keys(teams).map(teamName => {
            const t = teams[teamName];
            return {
                title: { pt: teamName, en: teamName },
                units: [t.slot1, t.slot2, t.slot3, t.slot4, t.slot5, t.slot6],
                dps: t.dps || "Stats N/A",
                tags: t.tags || [] // Guardando as tags estruturadas do teams.js
            };
        });

        // Organiza automaticamente do maior DPS para o menor
        globalTeams.sort((a, b) => {
            let dpsA = parseInt(String(a.dps).replace(/\D/g, '')) || 0;
            let dpsB = parseInt(String(b.dps).replace(/\D/g, '')) || 0;
            return dpsB - dpsA;
        });

        setupFilters();
        renderTeams();
    } catch (error) {
        console.error("Erro ao processar banco de dados:", error);
    }
}

/* --- Controle e Inicialização de Filtros Customizados --- */
function toggleDropdown(dropdownId) {
    const dropdown = document.getElementById(dropdownId);
    const isOpen = dropdown.classList.contains('show');
    
    // Fecha todos os dropdowns abertos antes
    document.querySelectorAll('.filter-dropdown').forEach(d => d.classList.remove('show'));
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));

    if (!isOpen) {
        dropdown.classList.add('show');
        dropdown.previousElementSibling.classList.add('active');
        if (dropdownId === 'unitDropdown') {
            document.getElementById('unitSearch').focus();
        }
    }
}

// Fecha os dropdowns ao clicar fora deles
window.addEventListener('click', function(e) {
    if (!e.target.matches('.filter-btn') && !e.target.matches('.filter-search-input') && !e.target.matches('.filter-dropdown') && !e.target.matches('.filter-option')) {
        document.querySelectorAll('.filter-dropdown').forEach(d => d.classList.remove('show'));
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    }
});

function setupFilters() {
    // 1. Configurando Filtro de Tags (Apenas 1 de cada tag existente nos times)
    const tagDropdown = document.getElementById('tagDropdown');
    const uniqueTags = new Set();
    globalTeams.forEach(team => {
        if (team.tags) {
            team.tags.forEach(tag => uniqueTags.add(tag));
        }
    });

    let tagHtml = `<div class="filter-option selected" id="tag-opt-all" onclick="selectTag('')">${lang === 'pt' ? 'Todas' : 'All'}</div>`;
    uniqueTags.forEach(tag => {
        tagHtml += `<div class="filter-option" id="tag-opt-${tag}" onclick="selectTag('${tag}')">${tag}</div>`;
    });
    tagDropdown.innerHTML = tagHtml;

    // 2. Configurando Filtro de Units (Apenas as registradas e vinculadas a pelo menos um time)
    const unitOptionsContainer = document.getElementById('unitOptionsContainer');
    const unitsInTeams = new Set();
    
    globalTeams.forEach(team => {
        team.units.forEach(slot => {
            const names = Array.isArray(slot) ? slot : [slot];
            names.forEach(name => {
                if (globalUnits[name]) {
                    unitsInTeams.add(name);
                }
            });
        });
    });

    let unitHtml = `<div class="filter-option selected" id="unit-opt-all" onclick="selectUnit('')">${lang === 'pt' ? 'Todas' : 'All'}</div>`;
    Array.from(unitsInTeams).sort().forEach(unitName => {
        unitHtml += `<div class="filter-option" data-name="${unitName.toLowerCase()}" id="unit-opt-${CSS.escape(unitName)}" onclick="selectUnit('${unitName.replace(/'/g, "\\'")}')">${unitName}</div>`;
    });
    unitOptionsContainer.innerHTML = unitHtml;
}

function filterUnitOptions() {
    const query = document.getElementById('unitSearch').value.toLowerCase();
    const options = document.querySelectorAll('#unitOptionsContainer .filter-option');
    options.forEach(opt => {
        const name = opt.getAttribute('data-name');
        if (!name || name.includes(query)) {
            opt.style.display = "block";
        } else {
            opt.style.display = "none";
        }
    });
}

function selectTag(tag) {
    selectedTag = tag;
    const btn = document.getElementById('tagFilterBtn');
    btn.textContent = tag ? `Tag: ${tag}` : (uiText[lang].allTags);
    
    document.querySelectorAll('#tagDropdown .filter-option').forEach(opt => opt.classList.remove('selected'));
    if(tag) {
        document.getElementById(`tag-opt-${tag}`).classList.add('selected');
    } else {
        document.getElementById('tag-opt-all').classList.add('selected');
    }
    
    document.getElementById('tagDropdown').classList.remove('show');
    btn.classList.remove('active');
    renderTeams();
}

function selectUnit(unitName) {
    selectedUnit = unitName;
    const btn = document.getElementById('unitFilterBtn');
    btn.textContent = unitName ? `Unit: ${unitName}` : (uiText[lang].allUnits);
    
    document.querySelectorAll('#unitOptionsContainer .filter-option').forEach(opt => opt.classList.remove('selected'));
    if(unitName) {
        document.getElementById(`unit-opt-${CSS.escape(unitName)}`).classList.add('selected');
    } else {
        document.getElementById('unit-opt-all').classList.add('selected');
    }
    
    document.getElementById('unitDropdown').classList.remove('show');
    btn.classList.remove('active');
    renderTeams();
}

// Função auxiliar interna para gerar as tags HTML de Elementos mapeados estruturadamente
function getElementsHtml(unitData) {
    if (!unitData.elements) return '';

    let elementsArr = Array.isArray(unitData.elements) ? unitData.elements : [unitData.elements];
    let elementsHtml = '<div class="elements-wrapper">';

    if (elementsArr.length === 1) {
        elementsHtml += `
            <div class="element-frame frame-single">
                <img src="assets/elements/${elementsArr[0]}.png" onerror="this.parentNode.style.display='none'">
            </div>
        `;
    } else if (elementsArr.length >= 2) {
        // Moldura 1 na frente (frame-1), Moldura 2 logo atrás levemente para direita e para cima (frame-2)
        elementsHtml += `
            <div class="element-frame frame-2">
                <img src="assets/elements/${elementsArr[1]}.png" onerror="this.parentNode.style.display='none'">
            </div>
            <div class="element-frame frame-1">
                <img src="assets/elements/${elementsArr[0]}.png" onerror="this.parentNode.style.display='none'">
            </div>
        `;
    }

    elementsHtml += '</div>';
    return elementsHtml;
}

function renderTeams() {
    const container = document.getElementById('teamsContainer');
    container.innerHTML = "";
    const ui = uiText[lang];

    // Atualiza os placeholders e labels dos botões de acordo com o idioma ativo
    document.getElementById('tagFilterBtn').textContent = selectedTag ? `Tag: ${selectedTag}` : ui.allTags;
    document.getElementById('unitFilterBtn').textContent = selectedUnit ? `Unit: ${selectedUnit}` : ui.allUnits;
    const uSearch = document.getElementById('unitSearch');
    if(uSearch) uSearch.placeholder = lang === 'pt' ? "Buscar unit..." : "Search unit...";

    // Filtra os times baseando-se nos dois critérios de UI personalizados selecionados
    const filteredTeams = globalTeams.filter(team => {
        // Verifica Filtro 1: Tag
        const matchTag = !selectedTag || (team.tags && team.tags.includes(selectedTag));
        
        // Verifica Filtro 2: Presença da Unit no Time
        let matchUnit = !selectedUnit;
        if (selectedUnit) {
            matchUnit = team.units.some(slot => {
                if (Array.isArray(slot)) {
                    return slot.includes(selectedUnit);
                }
                return slot === selectedUnit;
            });
        }

        return matchTag && matchUnit;
    });

    if (filteredTeams.length === 0) {
        document.getElementById('langBtn').textContent = ui.btn;
        container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 5px; opacity: 0.6; font-weight: bold;">${ui.noTeams}</div>`;
        return;
    }

    filteredTeams.forEach((team, index) => {
        const block = document.createElement('div');
        block.className = 'team-block';

        // Elemento do DPS Rank no canto superior direito (index + 1)
        const rankDiv = document.createElement('div');
        rankDiv.className = 'team-rank';
        rankDiv.textContent = `DPS Rank: #${index + 1}`;
        block.appendChild(rankDiv);

        const title = document.createElement('div');
        title.className = 'team-title';
        title.textContent = capitalizeWords(team.title[lang]);

        // Novo Container Preto que estende horizontalmente de ponta a ponta
        const fullSlotsContainer = document.createElement('div');
        fullSlotsContainer.className = 'slots-full-container';

        const grid = document.createElement('div');
        grid.className = 'unit-grid';

        team.units.forEach(unitNameOrArray => {
            const slotDiv = document.createElement('div');
            slotDiv.className = 'unit-slot';

            const unitsInSlot = Array.isArray(unitNameOrArray) ? unitNameOrArray : [unitNameOrArray];

            unitsInSlot.forEach((name, index) => {
                const unitData = globalUnits[name] || { name: name, trait: "Common", image: "sem_icone.png" };

                const unitCard = document.createElement('div');
                unitCard.className = 'unit-card';
                unitCard.onclick = () => openModal(unitData);

                // Removida a trait antiga do canto superior esquerdo e adicionadas as molduras redondas de elementos no canto inferior direito
                unitCard.innerHTML = `
                    <img src="assets/units/${unitData.image}" onerror="this.src='assets/sem_icone.png'">
                    ${getElementsHtml(unitData)}
                    ${unitsInSlot.length > 1 && index === 0 ? '<div class="swap-indicator">▼ swap</div>' : ''}
                `;
                slotDiv.appendChild(unitCard);
            });

            grid.appendChild(slotDiv);
        });

        // Container inferior para alinhar perfeitamente o botão #tags à esquerda e o dps à direita
        const footerDiv = document.createElement('div');
        footerDiv.className = 'team-footer';

        const tagsBtn = document.createElement('div');
        tagsBtn.className = 'team-tags-btn';
        tagsBtn.textContent = '#tags';
        tagsBtn.onclick = () => openTagsModal(team);

        const dps = document.createElement('div');
        dps.className = 'team-dps';
        dps.textContent = `${ui.dpsLabel} ~ ${team.dps}`;

        footerDiv.appendChild(tagsBtn);
        footerDiv.appendChild(dps);

        block.appendChild(title);
        fullSlotsContainer.appendChild(grid); // Insere o Grid no container preto de ponta a ponta
        block.appendChild(fullSlotsContainer);
        block.appendChild(footerDiv);
        container.appendChild(block);
    });

    document.getElementById('langBtn').textContent = ui.btn;
}

// Nova função para renderizar as tags do time em um modal similar ao de Slots
function openTagsModal(team) {
    const modal = document.getElementById('modalContent');
    const overlay = document.getElementById('modalOverlay');
    const ui = uiText[lang];

    overlay.style.display = "block"; 
    modal.style.display = "flex";

    let tagsHtml = '';
    if (team.tags && team.tags.length > 0) {
        team.tags.forEach(tag => {
            tagsHtml += `<div class="tag-badge">${tag}</div>`;
        });
    } else {
        tagsHtml += `<div style="opacity: 0.5; font-style: italic;">N/A</div>`;
    }

    modal.innerHTML = `
        <div style="width: 100%; text-align: center; margin-bottom: 10px;">
            <h2 style="margin: 0; color: #ffffff;">${capitalizeWords(team.title[lang])}</h2>
            <div style="font-weight: bold; opacity: 0.8; font-size: 14px; margin-top: 10px;">${ui.tagsLabel}</div>
        </div>
        <hr style="width: 100%; border: 0; border-top: 1px solid var(--border); margin: 15px 0;">
        <div class="modal-tags-container">
            ${tagsHtml}
        </div>
        <hr style="width: 100%; border: 0; border-top: 1px solid var(--border); margin: 20px 0;">
        <p style="margin: 0; font-size: 14px; opacity: 0.7;">${ui.closeMsg}</p>
    `;

    setTimeout(() => {
        overlay.classList.add('active');
        modal.classList.add('open');
    }, 10);
}

function openModal(unit) {
    const modal = document.getElementById('modalContent');
    const overlay = document.getElementById('modalOverlay');
    const ui = uiText[lang];

    // Correção do Bug Mobile: Garante que o display seja resetado antes de aplicar animação
    overlay.style.display = "block"; 
    modal.style.display = "flex";

    // Sistema de verificação de tags [1] ou [2] no nome da trait
    let traitNameClean = unit.trait;
    let traitClass = "trait-white-text";

    if (unit.trait.includes("[1]")) {
        traitNameClean = unit.trait.replace(/\[1\]/g, "");
        traitClass = "monarch-gradient-text";
    } else if (unit.trait.includes("[2]")) {
        traitNameClean = unit.trait.replace(/\[2\]/g, "");
        traitClass = "trait-yellow-text";
    }

    // Tratamento dos nomes para buscar a imagem substituindo espaços por _
    const memoriaNome = unit.memoria || "N/A";
    const familiarNome = unit.familiar || "N/A";
    const memoriaImgFile = memoriaNome.split(' ').join('_') + '.png';
    const familiarImgFile = familiarNome.split(' ').join('_') + '.png';

    // Captura as classes de degradê dinamicamente com base nas escolhas informadas
    const memoriaGradientClass = getMemoriaClass(memoriaNome);
    const familiarGradientClass = "frame-familiar-gradient";

    // Adicionado os elementos por cima da foto da Unit do mesmo jeito que no Grid
    modal.innerHTML = `
        <div style="display: flex; align-items: center; gap: 20px; width: 100%; text-align: left;">
            <div class="modal-unit-container">
                <img src="assets/units/${unit.image}" class="modal-unit-img" onerror="this.src='assets/sem_icone.png'">
                ${getElementsHtml(unit)}
            </div>
            <div style="display: flex; flex-direction: column; gap: 5px;">
                <h2 style="margin: 0; color: #ffffff;">${unit.name}</h2>
                <div style="font-weight: bold; opacity: 0.8; font-size: 14px; margin-top: 5px;">${ui.bestTrait}</div>
                <div class="trait-container" style="margin-top: 5px;">
                    <img src="assets/traits/${traitNameClean.trim()}.png" class="trait-img" onerror="this.style.display='none'">
                    <div class="trait-tag ${traitClass}" style="padding: 0; font-size: 16px;">${traitNameClean}</div>
                </div>
            </div>
        </div>
        <hr style="width: 100%; border: 0; border-top: 1px solid var(--border); margin: 20px 0;">
        
        <div class="modal-frames-row">
            <div class="modal-frame-box">
                <div class="modal-frame-label">${ui.memoriaLabel}</div>
                <div class="modal-frame-title">${memoriaNome}</div>
                <div class="modal-frame-square ${memoriaGradientClass}">
                    <img src="assets/memoria/${memoriaImgFile}" onerror="this.src='assets/sem_icone.png'">
                </div>
            </div>
            <div class="modal-frame-box">
                <div class="modal-frame-label">${ui.familiarLabel}</div>
                <div class="modal-frame-title">${familiarNome}</div>
                <div class="modal-frame-square ${familiarGradientClass}">
                    <img src="assets/familiars/${familiarImgFile}" onerror="this.src='assets/sem_icone.png'">
                </div>
            </div>
        </div>

        <p style="margin: 0; font-size: 14px; opacity: 0.7;">${ui.closeMsg}</p>
    `;

    // Delay mínimo para o navegador processar o display:block antes da transição de opacidade/transform
    setTimeout(() => {
        overlay.classList.add('active');
        modal.classList.add('open');
    }, 10);
}

function closeModal() {
    const modal = document.getElementById('modalContent');
    const overlay = document.getElementById('modalOverlay');

    modal.classList.remove('open');
    overlay.classList.remove('active');

    // Espera a animação terminar para esconder o elemento (300ms)
    setTimeout(() => {
        if (!modal.classList.contains('open')) {
            modal.style.display = "none";
            overlay.style.display = "none";
        }
    }, 300);
}

function toggleLang() {
    lang = lang === "pt" ? "en" : "pt";
    localStorage.setItem("siteLang", lang);
    setupFilters();
    renderTeams();
}

window.onload = loadDatabase;
