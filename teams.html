<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Vanguards - Team Comps</title>

    <script src="database/teams.js"></script>
    <script src="database/units.js"></script>

    <link rel="stylesheet" href="menu.css">
    <script src="menu.js" defer></script>

    <style>
        /* --- Variáveis e Temas --- */
        :root {
            --bg: #f2f4f7;
            --card: #ffffff;
            --text: #111;
            --border: #ccc;
            --hover: #f1f1f1;
            --lang-btn: #ffffff;
            --lang-btn-bg: #444;
            --primary: #0d47a1;
            --trait-color: #2c3e50;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f1217;
                --card: #181c24;
                --text: #ffffff;
                --border: #2a2f3a;
                --hover: #232836;
                --lang-btn: #111;
                --lang-btn-bg: #ffffff;
                --primary: #64b5f6;
                --trait-color: #34495e;
            }
        }

        /* --- Geral --- */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            margin: 0;
            line-height: 1.5;
            padding-bottom: 80px; 
        }

        .header { 
            display: flex; 
            justify-content: center; 
            max-width: 1200px; 
            margin: 0 auto 30px; 
        }
        .logo { width: 220px; max-width: 60vw; }

        /* --- Barra de Pesquisa --- */
        .search-container {
            display: flex;
            justify-content: center;
            margin: 0 auto 30px;
            width: 50%; /* 50% menor no PC */
        }
        .search-container input {
            width: 100%;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 25px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .search-container input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 8px rgba(13, 71, 161, 0.2);
        }

        /* --- Estilo das Composições --- */
        .teams-container {
            max-width: 1200px; /* Aumentado para comportar 2 colunas */
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 Colunas para PC */
            gap: 40px;
        }

        .team-block {
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* Nome do Time para a Esquerda */
            background: var(--card);
            border: 1px solid var(--border);
            padding: 25px 0; /* Ajustado padding lateral por conta do container full-width interno */
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .team-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0 25px;
        }

        /* Container Preto Interno indo da extrema esquerda até a direita */
        .slots-outer-container {
            width: 100%;
            background-color: #000000;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            padding: 15px 25px;
        }

        .unit-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3x2 para PC */
            gap: 10px;
            width: 100%;
        }

        .unit-slot {
            aspect-ratio: 1 / 1;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            width: 85%; /* Diminuído o tamanho em 15% */
            margin: 0 auto; /* Centraliza o slot menor na sua respectiva coluna */
        }
        .unit-slot::-webkit-scrollbar { display: none; }

        .unit-card {
            height: 100%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            scroll-snap-align: start;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
        }

        .unit-card img {
            width: 85%;
            height: 85%;
            object-fit: contain;
        }

        /* --- Novo Sistema de Moldura Redonda de Elementos --- */
        .element-wrapper {
            position: absolute;
            bottom: -5px;
            right: -5px;
            width: 32px;
            height: 32px;
            z-index: 10; /* Garante sobreposição total sem cortes pela moldura do slot */
        }

        .element-badge {
            position: absolute;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #232836; /* Fundo escuro para destacar o elemento */
            border: 1px solid #555555; /* Borda fina cor cinza escuro */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3px;
        }

        .element-badge img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Posicionamento do Elemento 1 (Frente) e Elemento 2 (Trás) */
        .element-badge.el-primary {
            z-index: 12;
            bottom: 0;
            right: 0;
        }

        .element-badge.el-secondary {
            z-index: 11;
            bottom: 30%; /* 30% para cima */
            right: -30%; /* 30% para a direita */
        }

        .swap-indicator {
            position: absolute;
            bottom: 4px;
            font-size: 10px;
            opacity: 0.5;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-3px);}
            60% {transform: translateY(-2px);}
        }

        .team-dps {
            align-self: flex-end; /* DPS para a Direita */
            margin-top: 15px;
            font-weight: bold;
            font-size: 16px;
            background: var(--border);
            padding: 5px 20px;
            border-radius: 20px;
            color: var(--text);
            margin-right: 25px;
        }

        /* --- Modal --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 10001;
            display: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .modal-overlay.active { display: block; opacity: 1; }

        .modal-content {
            background: var(--card);
            position: fixed;
            z-index: 10002;
            padding: 25px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            display: none; 
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        @media (min-width: 769px) {
            .modal-content {
                width: 400px;
                top: 50%; left: 50%;
                transform: translate(-50%, -50%);
                border-radius: 15px;
            }
        }

        @media (max-width: 768px) {
            .header {
                justify-content: flex-end; /* Logo no canto superior direito para Mobile */
            }

            .logo {
                width: 165px; /* Reduzido em 25% (Original 220px) */
            }

            .search-container {
                width: 75%; /* 25% menor no Mobile */
            }

            .teams-container {
                grid-template-columns: 1fr; /* 1 coluna para Mobile */
            }

            .team-block {
                padding: 25px 0;
            }

            .slots-outer-container {
                padding: 15px 15px;
            }

            .unit-grid { 
                grid-template-columns: repeat(3, 1fr); 
                gap: 5px;
            } 

            .modal-content {
                width: 100%;
                bottom: 0; left: 0;
                border-radius: 20px 20px 0 0;
                transform: translateY(100%);
                transition: transform 0.4s ease;
            }
            .modal-content.open { transform: translateY(0); }
        }

        .modal-unit-container {
            position: relative;
            width: 120px;
            height: 120px;
            flex-shrink: 0;
        }

        .modal-unit-img { width: 120px; height: 120px; margin-bottom: 0; }

        .trait-container {
            display: flex;
            flex-direction: row; 
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .trait-img {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        .trait-tag {
            background: var(--trait-color);
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
        }

        /* --- Idioma --- */
        .lang-toggle {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }
        .lang-toggle button {
            background: var(--text);
            color: var(--card);
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>

<header class="header">
    <img src="assets/Av_logo.png" alt="Anime Vanguards Logo" class="logo">
</header>

<div class="search-container">
    <input type="text" id="searchBar" oninput="renderTeams()">
</div>

<main>
    <div class="teams-container" id="teamsContainer">
    </div>
</main>

<div class="lang-toggle">
    <button id="langBtn" onclick="toggleLang()"></button>
</div>

<div id="modalOverlay" class="modal-overlay" onclick="closeModal()"></div>
<div id="modalContent" class="modal-content"></div>

<script>
let lang = localStorage.getItem("siteLang") || "pt";

const uiText = {
    pt: { btn: "🇧🇷 PT", dpsLabel: "DPS Total: ", bestTrait: "Melhor Trait: ", noTeams: "Nenhum time aqui ainda", closeMsg: "Clique fora para fechar", searchPlaceholder: "Pesquisar times..." },
    en: { btn: "🇺🇸 EN", dpsLabel: "Total DPS: ", bestTrait: "Best Trait: ", noTeams: "No teams here yet", closeMsg: "Click outside to close", searchPlaceholder: "Search teams..." }
};

let globalUnits = {};
let globalTeams = [];

function loadDatabase() {
    try {
        globalUnits = {};
        for (const name in units) {
            globalUnits[name] = {
                ...units[name],
                name: name 
            };
        }

        globalTeams = Object.keys(teams).map(teamName => {
            const t = teams[teamName];
            return {
                title: { pt: teamName, en: teamName },
                units: [t.slot1, t.slot2, t.slot3, t.slot4, t.slot5, t.slot6],
                dps: t.dps || "Stats N/A"
            };
        });

        // Organiza automaticamente do maior DPS para o menor
        globalTeams.sort((a, b) => {
            let dpsA = parseInt(String(a.dps).replace(/\D/g, '')) || 0;
            let dpsB = parseInt(String(b.dps).replace(/\D/g, '')) || 0;
            return dpsB - dpsA;
        });

        renderTeams();
    } catch (error) {
        console.error("Erro ao processar banco de dados:", error);
    }
}

// Função auxiliar para estruturar dinamicamente a moldura redonda dupla ou unitária de elementos
function getElementsHTML(unitData) {
    if (!unitData.elements) return '';
    
    const elementsArray = Array.isArray(unitData.elements) ? unitData.elements : [unitData.elements];
    let elementsHTML = '<div class="element-wrapper">';
    
    if (elementsArray.length === 1) {
        elementsHTML += `
            <div class="element-badge el-primary">
                <img src="assets/elements/${elementsArray[0]}.png" onerror="this.parentNode.style.display='none'">
            </div>
        `;
    } else if (elementsArray.length >= 2) {
        elementsHTML += `
            <div class="element-badge el-secondary">
                <img src="assets/elements/${elementsArray[1]}.png" onerror="this.parentNode.style.display='none'">
            </div>
            <div class="element-badge el-primary">
                <img src="assets/elements/${elementsArray[0]}.png" onerror="this.parentNode.style.display='none'">
            </div>
        `;
    }
    
    elementsHTML += '</div>';
    return elementsHTML;
}

function renderTeams() {
    const container = document.getElementById('teamsContainer');
    container.innerHTML = "";
    const ui = uiText[lang];

    // Atualiza o placeholder da barra de pesquisa de acordo com o idioma ativo
    const searchBar = document.getElementById('searchBar');
    if (searchBar) searchBar.placeholder = ui.searchPlaceholder;

    const searchQuery = searchBar ? searchBar.value.toLowerCase() : "";

    // Filtra os times baseando-se no termo digitado
    const filteredTeams = globalTeams.filter(team => {
        return team.title[lang].toLowerCase().includes(searchQuery);
    });

    if (filteredTeams.length === 0) {
        document.getElementById('langBtn').textContent = ui.btn;
        return;
    }

    filteredTeams.forEach(team => {
        const block = document.createElement('div');
        block.className = 'team-block';

        const title = document.createElement('div');
        title.className = 'team-title';
        title.textContent = team.title[lang];

        // Novo Container Preto Interno que ocupa a largura total do Bloco
        const outerContainer = document.createElement('div');
        outerContainer.className = 'slots-outer-container';

        const grid = document.createElement('div');
        grid.className = 'unit-grid';

        team.units.forEach(unitNameOrArray => {
            const slotDiv = document.createElement('div');
            slotDiv.className = 'unit-slot';

            const unitsInSlot = Array.isArray(unitNameOrArray) ? unitNameOrArray : [unitNameOrArray];

            unitsInSlot.forEach((name, index) => {
                const unitData = globalUnits[name] || { name: name, trait: "Common", image: "sem_icone.png" };

                const unitCard = document.createElement('div');
                unitCard.className = 'unit-card';
                unitCard.onclick = () => openModal(unitData);

                // Geração das molduras redondas de elementos substituindo a imagem da trait do canto superior esquerdo
                const elementsHTML = getElementsHTML(unitData);

                unitCard.innerHTML = `
                    <img src="assets/units/${unitData.image}" onerror="this.src='assets/sem_icone.png'">
                    ${elementsHTML}
                    ${unitsInSlot.length > 1 && index === 0 ? '<div class="swap-indicator">▼ swap</div>' : ''}
                `;
                slotDiv.appendChild(unitCard);
            });

            grid.appendChild(slotDiv);
        });

        outerContainer.appendChild(grid);

        const dps = document.createElement('div');
        dps.className = 'team-dps';
        dps.textContent = `${ui.dpsLabel} ~ ${team.dps}`;

        block.appendChild(title);
        block.appendChild(outerContainer);
        block.appendChild(dps);
        container.appendChild(block);
    });

    document.getElementById('langBtn').textContent = ui.btn;
}

function openModal(unit) {
    const modal = document.getElementById('modalContent');
    const overlay = document.getElementById('modalOverlay');
    const ui = uiText[lang];

    // Correção do Bug Mobile: Garante que o display seja resetado antes de aplicar animação
    overlay.style.display = "block"; 
    modal.style.display = "flex";

    // Adiciona o elemento na imagem da Unit exatamente como no grid
    const elementsHTML = getElementsHTML(unit);

    modal.innerHTML = `
        <div style="display: flex; align-items: center; gap: 20px; width: 100%; text-align: left;">
            <div class="modal-unit-container">
                <img src="assets/units/${unit.image}" class="modal-unit-img" onerror="this.src='assets/sem_icone.png'">
                ${elementsHTML}
            </div>
            <div style="display: flex; flex-direction: column; gap: 5px;">
                <h2 style="margin: 0; color: var(--primary);">${unit.name}</h2>
                <div style="font-weight: bold; opacity: 0.8; font-size: 14px; margin-top: 5px;">${ui.bestTrait}</div>
                <div class="trait-container" style="margin-top: 5px;">
                    <img src="assets/traits/${unit.trait}.png" class="trait-img" onerror="this.style.display='none'">
                    <div class="trait-tag">${unit.trait}</div>
                </div>
            </div>
        </div>
        <hr style="width: 100%; border: 0; border-top: 1px solid var(--border); margin: 20px 0;">
        <p style="margin: 0; font-size: 14px; opacity: 0.7;">${ui.closeMsg}</p>
    `;

    // Delay mínimo para o navegador processar o display:block antes da transição de opacidade/transform
    setTimeout(() => {
        overlay.classList.add('active');
        modal.classList.add('open');
    }, 10);
}

function closeModal() {
    const modal = document.getElementById('modalContent');
    const overlay = document.getElementById('modalOverlay');

    modal.classList.remove('open');
    overlay.classList.remove('active');

    // Espera a animação terminar para esconder o elemento (300ms)
    setTimeout(() => {
        if (!modal.classList.contains('open')) {
            modal.style.display = "none";
            overlay.style.display = "none";
        }
    }, 300);
}

function toggleLang() {
    lang = lang === "pt" ? "en" : "pt";
    localStorage.setItem("siteLang", lang);
    renderTeams();
}

window.onload = loadDatabase;
</script>

</body>
</html>
