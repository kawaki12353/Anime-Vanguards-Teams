<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Vanguards - Team Comps</title>

    <script src="database/teams.js"></script>
    <script src="database/units.js"></script>

    <link rel="stylesheet" href="menu.css">
    <script src="menu.js" defer></script>

    <style>
        /* --- Variáveis e Temas --- */
        :root {
            --bg: #f2f4f7;
            --card: #ffffff;
            --text: #111;
            --border: #ccc;
            --hover: #f1f1f1;
            --lang-btn: #ffffff;
            --lang-btn-bg: #444;
            --primary: #0d47a1;
            --trait-color: #2c3e50;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f1217;
                --card: #181c24;
                --text: #ffffff;
                --border: #2a2f3a;
                --hover: #232836;
                --lang-btn: #111;
                --lang-btn-bg: #ffffff;
                --primary: #64b5f6;
                --trait-color: #34495e;
            }
        }

        /* --- Geral --- */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            margin: 0;
            line-height: 1.5;
            padding-bottom: 80px; 
        }

        .header { 
            display: flex; 
            justify-content: center; 
            max-width: 1200px; 
            margin: 0 auto 30px; 
        }
        .logo { width: 220px; max-width: 60vw; }

        /* --- Barra de Pesquisa --- */
        .search-container {
            display: flex;
            justify-content: center;
            margin: 0 auto 30px;
            width: 50%; /* 50% menor no PC */
        }
        .search-container input {
            width: 100%;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 25px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .search-container input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 8px rgba(13, 71, 161, 0.2);
        }

        /* --- Estilo das Composições --- */
        .teams-container {
            max-width: 1200px; /* Aumentado para comportar 2 colunas */
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 Colunas para PC */
            gap: 40px;
        }

        .team-block {
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* Nome do Time para a Esquerda */
            background: var(--card);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .team-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Linha divisória entre o título e o container dos slots */
        .team-divider {
            width: 100%;
            border: 0;
            border-top: 2px solid var(--border);
            margin-bottom: 20px;
        }

        /* Novo container interno que envelopa o grid e possui fundo preto */
        .slots-inner-container {
            width: 100%;
            background-color: #000000;
            padding: 20px;
            border-radius: 15px;
        }

        .unit-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3x2 para PC */
            gap: 15px;
            width: 100%;
        }

        .unit-slot {
            aspect-ratio: 1 / 1;
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            /* Diminuído o tamanho dos slots em 30% mantendo a proporção */
            width: 70%;
            margin: 0 auto;
        }
        .unit-slot::-webkit-scrollbar { display: none; }

        .unit-card {
            height: 100%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            scroll-snap-align: start;
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
        }

        .unit-card img {
            width: 85%;
            height: 85%;
            object-fit: contain;
        }

        /* Estilo para as Molduras Redondas no canto inferior direito */
        .elements-frame-container {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 28px;
            height: 28px;
            z-index: 3;
        }

        .element-round-frame {
            position: absolute;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.6);
            border: 1.5px solid #fff;
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .element-round-frame img {
            width: 85%;
            height: 85%;
            object-fit: contain;
        }

        /* Posicionamento quando houver 2 elementos */
        .element-frame-1 {
            bottom: 0;
            right: 4px;
            z-index: 5;
        }

        .element-frame-2 {
            bottom: 4px;
            right: 0;
            z-index: 4;
        }

        .swap-indicator {
            position: absolute;
            bottom: 4px;
            left: 4px;
            font-size: 8px;
            opacity: 0.7;
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 1px 3px;
            border-radius: 4px;
            animation: bounce 2s infinite;
            z-index: 6;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-3px);}
            60% {transform: translateY(-2px);}
        }

        .team-dps {
            align-self: flex-end; /* DPS para a Direita */
            margin-top: 15px;
            font-weight: bold;
            font-size: 16px;
            background: var(--border);
            padding: 5px 20px;
            border-radius: 20px;
            color: var(--text);
        }

        /* --- Modal --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 10001;
            display: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .modal-overlay.active { display: block; opacity: 1; }

        .modal-content {
            background: var(--card);
            position: fixed;
            z-index: 10002;
            padding: 25px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
            display: none; 
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        @media (min-width: 769px) {
            .modal-content {
                width: 400px;
                top: 50%; left: 50%;
                transform: translate(-50%, -50%);
                border-radius: 15px;
            }
        }

        @media (max-width: 768px) {
            .header {
                justify-content: flex-end; /* Logo no canto superior direito para Mobile */
            }

            .logo {
                width: 165px; /* Reduzido em 25% (Original 220px) */
            }

            .search-container {
                width: 75%; /* 25% menor no Mobile */
            }

            .teams-container {
                grid-template-columns: 1fr; /* 1 coluna para Mobile */
            }

            .unit-grid { 
                grid-template-columns: repeat(3, 1fr); 
                gap: 5px;
            } 

            .modal-content {
                width: 100%;
                bottom: 0; left: 0;
                border-radius: 20px 20px 0 0;
                transform: translateY(100%);
                transition: transform 0.4s ease;
            }
            .modal-content.open { transform: translateY(0); }
        }

        .modal-unit-img { width: 120px; height: 120px; margin-bottom: 15px; }

        .trait-container {
            display: flex;
            flex-direction: row; 
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .trait-img {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        .trait-tag {
            background: var(--trait-color);
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
        }

        /* --- Idioma --- */
        .lang-toggle {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }
        .lang-toggle button {
            background: var(--text);
            color: var(--card);
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>

<header class="header">
    <img src="assets/Av_logo.png" alt="Anime Vanguards Logo" class="logo">
</header>

<div class="search-container">
    <input type="text" id="searchBar" oninput="renderTeams()">
</div>

<main>
    <div class="teams-container" id="teamsContainer">
        </div>
</main>

<div class="lang-toggle">
    <button id="langBtn" onclick="toggleLang()"></button>
</div>

<div id="modalOverlay" class="modal-overlay" onclick="closeModal()"></div>
<div id="modalContent" class="modal-content"></div>

<script>
let lang = localStorage.getItem("siteLang") || "pt";

const uiText = {
    pt: { btn: "🇧🇷 PT", dpsLabel: "DPS Total: ", bestTrait: "Melhor Trait: ", noTeams: "Nenhum time aqui ainda", closeMsg: "Clique fora para fechar", searchPlaceholder: "Pesquisar times..." },
    en: { btn: "🇺🇸 EN", dpsLabel: "Total DPS: ", bestTrait: "Best Trait: ", noTeams: "No teams here yet", closeMsg: "Click outside to close", searchPlaceholder: "Search teams..." }
};

let globalUnits = {};
let globalTeams = [];

function loadDatabase() {
    try {
        globalUnits = {};
        for (const name in units) {
            globalUnits[name] = {
                ...units[name],
                name: name 
            };
        }

        globalTeams = Object.keys(teams).map(teamName => {
            const t = teams[teamName];
            return {
                title: { pt: teamName, en: teamName },
                units: [t.slot1, t.slot2, t.slot3, t.slot4, t.slot5, t.slot6],
                dps: t.dps || "Stats N/A"
            };
        });

        // Organiza automaticamente do maior DPS para o menor
        globalTeams.sort((a, b) => {
            let dpsA = parseInt(String(a.dps).replace(/\D/g, '')) || 0;
            let dpsB = parseInt(String(b.dps).replace(/\D/g, '')) || 0;
            return dpsB - dpsA;
        });

        renderTeams();
    } catch (error) {
        console.error("Erro ao processar banco de dados:", error);
    }
}

function renderTeams() {
    const container = document.getElementById('teamsContainer');
    container.innerHTML = "";
    const ui = uiText[lang];

    // Atualiza o placeholder da barra de pesquisa de acordo com o idioma ativo
    const searchBar = document.getElementById('searchBar');
    if (searchBar) searchBar.placeholder = ui.searchPlaceholder;

    const searchQuery = searchBar ? searchBar.value.toLowerCase() : "";

    // Filtra os times baseando-se no termo digitado
    const filteredTeams = globalTeams.filter(team => {
        return team.title[lang].toLowerCase().includes(searchQuery);
    });

    if (filteredTeams.length === 0) {
        document.getElementById('langBtn').textContent = ui.btn;
        return;
    }

    filteredTeams.forEach(team => {
        const block = document.createElement('div');
        block.className = 'team-block';

        const title = document.createElement('div');
        title.className = 'team-title';
        title.textContent = team.title[lang];

        // Barra divisória adicionada logo abaixo do título do time
        const divider = document.createElement('hr');
        divider.className = 'team-divider';

        // Novo container interno preto criado para acomodar os slots
        const slotsInnerContainer = document.createElement('div');
        slotsInnerContainer.className = 'slots-inner-container';

        const grid = document.createElement('div');
        grid.className = 'unit-grid';

        team.units.forEach(unitNameOrArray => {
            const slotDiv = document.createElement('div');
            slotDiv.className = 'unit-slot';

            const unitsInSlot = Array.isArray(unitNameOrArray) ? unitNameOrArray : [unitNameOrArray];

            unitsInSlot.forEach((name, index) => {
                const unitData = globalUnits[name] || { name: name, trait: "Common", image: "sem_icone.png", elements: [] };

                const unitCard = document.createElement('div');
                unitCard.className = 'unit-card';
                unitCard.onclick = () => openModal(unitData);

                // Lógica para tratar os elementos da Unit dinamicamente
                let elementsArray = [];
                if (unitData.elements) {
                    if (Array.isArray(unitData.elements)) {
                        elementsArray = unitData.elements;
                    } else {
                        elementsArray = [unitData.elements];
                    }
                }

                let elementsHTML = '<div class="elements-frame-container">';
                if (elementsArray.length === 1) {
                    elementsHTML += `
                        <div class="element-round-frame" style="bottom:0; right:0;">
                            <img src="assets/elements/${elementsArray[0]}.png" onerror="this.parentElement.style.display='none'">
                        </div>
                    `;
                } else if (elementsArray.length >= 2) {
                    // Moldura 1 fica na frente (frame-1), Moldura 2 fica logo atrás, um pouco pra direita e pra cima (frame-2)
                    elementsHTML += `
                        <div class="element-round-frame element-frame-2">
                            <img src="assets/elements/${elementsArray[1]}.png" onerror="this.parentElement.style.display='none'">
                        </div>
                        <div class="element-round-frame element-frame-1">
                            <img src="assets/elements/${elementsArray[0]}.png" onerror="this.parentElement.style.display='none'">
                        </div>
                    `;
                }
                elementsHTML += '</div>';

                // Renderização do slot sem a foto da trait no canto superior esquerdo, e com os elementos no canto inferior direito
                unitCard.innerHTML = `
                    <img src="assets/units/${unitData.image}" onerror="this.src='assets/sem_icone.png'">
                    ${elementsHTML}
                    ${unitsInSlot.length > 1 && index === 0 ? '<div class="swap-indicator">▼ swap</div>' : ''}
                `;
                slotDiv.appendChild(unitCard);
            });

            grid.appendChild(slotDiv);
        });

        const dps = document.createElement('div');
        dps.className = 'team-dps';
        dps.textContent = `${ui.dpsLabel} ~ ${team.dps}`;

        // Construindo a nova árvore estrutural do bloco
        block.appendChild(title);
        block.appendChild(divider); // Adiciona a barra divisória
        slotsInnerContainer.appendChild(grid); // Insere o grid dentro do container preto
        block.appendChild(slotsInnerContainer); // Adiciona o container preto ao bloco do time
        block.appendChild(dps);
        container.appendChild(block);
    });

    document.getElementById('langBtn').textContent = ui.btn;
}

function openModal(unit) {
    const modal = document.getElementById('modalContent');
    const overlay = document.getElementById('modalOverlay');
    const ui = uiText[lang];

    // Correção do Bug Mobile: Garante que o display seja resetado antes de aplicar animação
    overlay.style.display = "block"; 
    modal.style.display = "flex";

    modal.innerHTML = `
        <div style="display: flex; align-items: center; gap: 20px; width: 100%; text-align: left;">
            <img src="assets/units/${unit.image}" class="modal-unit-img" style="margin-bottom: 0; flex-shrink: 0;" onerror="this.src='assets/sem_icone.png'">
            <div style="display: flex; flex-direction: column; gap: 5px;">
                <h2 style="margin: 0; color: var(--primary);">${unit.name}</h2>
                <div style="font-weight: bold; opacity: 0.8; font-size: 14px; margin-top: 5px;">${ui.bestTrait}</div>
                <div class="trait-container" style="margin-top: 5px;">
                    <img src="assets/traits/${unit.trait}.png" class="trait-img" onerror="this.style.display='none'">
                    <div class="trait-tag">${unit.trait}</div>
                </div>
            </div>
        </div>
        <hr style="width: 100%; border: 0; border-top: 1px solid var(--border); margin: 20px 0;">
        <p style="margin: 0; font-size: 14px; opacity: 0.7;">${ui.closeMsg}</p>
    `;

    // Delay mínimo para o navegador processar o display:block antes da transição de opacidade/transform
    setTimeout(() => {
        overlay.classList.add('active');
        modal.classList.add('open');
    }, 10);
}

function closeModal() {
    const modal = document.getElementById('modalContent');
    const overlay = document.getElementById('modalOverlay');

    modal.classList.remove('open');
    overlay.classList.remove('active');

    // Espera a animação terminar para esconder o elemento (300ms)
    setTimeout(() => {
        if (!modal.classList.contains('open')) {
            modal.style.display = "none";
            overlay.style.display = "none";
        }
    }, 300);
}

function toggleLang() {
    lang = lang === "pt" ? "en" : "pt";
    localStorage.setItem("siteLang", lang);
    renderTeams();
}

window.onload = loadDatabase;
</script>

</body>
</html>
